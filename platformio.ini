[platformio]
src_dir = .
include_dir = .
test_dir = Core/Test
default_envs = release

[env:release]
platform = ststm32
upload_protocol = stlink
platform_packages = 
  toolchain-gccarmnoneeabi@=1.140201.0
debug_tool = stlink
monitor_speed = 115200
extra_scripts = pre:scripts/build_script.py

board = nucleo_f767zi
board_build.ldscript = stm32f767vgtx_flash.ld

build_flags =
    -std=gnu23
    -DUSE_HAL_DRIVER
    -DSTM32F767xx
    -ICore/Inc
    -ICore/Inc/ecu/fsm
    -ICore/Inc/ecu/buzzer
    -ICore/Inc/ecu/pedals
    -ICore/Inc/ecu/tractive-system
    -ICore/Inc/ecu/raspberry
    -ICore/Inc/ecu/inverters
    -ICore/Inc/ecu/as-driver
    -ICore/Inc/ecu/logger
    -IDrivers/STM32F7xx_HAL_Driver/Inc
    -IDrivers/STM32F7xx_HAL_Driver/Inc/Legacy
    -IDrivers/CMSIS/Device/ST/STM32F7xx/Include
    -IDrivers/CMSIS/Include

build_src_filter =
    +<startup_stm32f767xx.s>
    +<Core/Src/>
    +<Drivers/STM32F7xx_HAL_Driver/Src>
    -<Drivers/STM32F7xx_HAL_Driver/Src/*_template.c>

lib_deps = 
    https://github.com/eagletrt/libeagletrt-sw.git#v0.1.0
    https://github.com/eagletrt/libpal-sw.git#v0.1.0

check_tool = clangtidy
check_flags =
    clangtidy: --checks=-*,cert-*,clang-analyzer-*,bugprone-*,performance-*,readability-*,-bugprone-easily-swappable-parameters
    clangtidy: --warnings-as-errors=clang-analyzer-*,bugprone-*
    clangtidy: --header-filter=^.*Core/(Inc|Src)/.+/[^/]+\.(c|h)$
    clangtidy: --system-headers=false

check_src_filters =
    -<**>
    +<Core/Src/>
    +<Core/Inc/>
    -<Core/Src/stm32*_hal_msp.c>
    -<Core/Src/stm32*_it.c>
    -<Core/Src/syscalls.c>
    -<Core/Src/sysmem.c>

[env:tests]
platform = native
test_framework = unity
test_build_src = true

build_flags = 
    -DEAGLETRT_STATIC=
    -DEAGLETRT_STATIC_INLINE=
    -lm ;flag required to link the math.h library
    -ICore/Inc/ecu/fsm
    -ICore/Inc/ecu/buzzer
    -ICore/Inc/ecu/pedals
    -ICore/Inc/ecu/tractive-system
    -ICore/Inc/ecu/raspberry
    -ICore/Inc/ecu/inverters
    -ICore/Inc/ecu/as-driver
    -ICore/Inc/ecu/logger
    -ICore/Test/include

build_src_filter =
    +<Core/Src/ecu/fsm/>
    +<Core/Src/ecu/buzzer/>
    +<Core/Src/ecu/pedals/>
    +<Core/Src/ecu/tractive-system/>
    +<Core/Src/ecu/raspberry/>
    +<Core/Src/ecu/inverters/>
    +<Core/Src/ecu/as-driver/>
    +<Core/Src/ecu/logger/>

lib_deps =
    
    https://github.com/eagletrt/libeagletrt-sw.git#v0.1.0
    https://github.com/eagletrt/libpal-sw.git#v0.1.0

[env:bootloader]
platform = ststm32
upload_protocol = stlink
debug_tool = stlink
platform_packages = 
  toolchain-gccarmnoneeabi@=1.140201.0
monitor_speed = 115200
extra_scripts = pre:scripts/build_script.py

board = nucleo_f767zi
board_build.ldscript = ecu-sw-bootloader/stm32f767vgtx_flash.ld

build_flags =
    -std=gnu23
    -DUSE_HAL_DRIVER
    -DUSE_FULL_LL_DRIVER
	-Iecu-sw-bootloader/Core/Inc
    -Iecu-sw-bootloader/Drivers/STM32F7xx_HAL_Driver/Inc
    -Iecu-sw-bootloader/Drivers/STM32F7xx_HAL_Driver/Inc/Legacy
    -Iecu-sw-bootloader/Drivers/CMSIS/Device/ST/STM32F7xx/Include
    -Iecu-sw-bootloader/Drivers/CMSIS/Include

build_src_filter =
    +<*-bootloader/*.s>
    +<*-bootloader/Core/Src/>
    +<*-bootloader/Drivers/STM32F7xx_HAL_Driver/Src/>
    -<*-bootloader/Drivers/STM32F7xx_HAL_Driver/Src/*_template.c>