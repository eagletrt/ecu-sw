[platformio]
src_dir = Core/Src
include_dir = Core/Inc
test_dir = Core/Test

default_envs= nucleo_f767zi ;pio run will exclude native env

[env:native]
platform = native
test_framework = unity
lib_deps = throwtheswitch/Unity@^2.6.0
test_build_src = true
build_src_filter = 
    +<ecu_fsm.c>

[env:nucleo_f767zi]
platform = ststm32
board = nucleo_f767zi
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
board_build.ldscript = stm32f767vgtx_flash.ld

check_src_filters =
    +<Core/Src/*>
    +<Core/Inc/*>
    +<Core/Test/*>
    -<Drivers/*>

build_flags = 
    -Wall
    -Wextra
    -Wpedantic 
	-ICore/Inc
    -IDrivers/CMSIS/Include
    -IDrivers/STM32F7xx_HAL_Driver/Inc
    -IDrivers/STM32F7xx_HAL_Driver/Inc/Legacy
    -IDrivers/CMSIS/Device/ST/STM32F7xx/Include
    -DUSE_HAL_DRIVER

build_src_filter = 