[platformio]
src_dir = .
include_dir = .
test_dir = Core/Test
default_envs = nucleo_f767zi

[env:nucleo_f767zi]
platform = ststm32
board = nucleo_f767zi
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200

board_build.ldscript = stm32f767vgtx_flash.ld

extra_scripts = pre:scripts/build_flags.py

build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32F767xx
    -ICore/Inc
    -ICore/Inc/ecu/fsm
    -ICore/Inc/ecu/buzzer
    -ICore/Inc/ecu/pedals
    -ICore/Inc/ecu/tractive-system
    -ICore/Inc/ecu/post
    -IDrivers/STM32F7xx_HAL_Driver/Inc
    -IDrivers/STM32F7xx_HAL_Driver/Inc/Legacy
    -IDrivers/CMSIS/Device/ST/STM32F7xx/Include
    -IDrivers/CMSIS/Include

build_src_filter =
    +<startup_stm32f767xx.s>
    +<Core/Src/>
    +<Drivers/STM32F7xx_HAL_Driver/Src>
    -<Drivers/STM32F7xx_HAL_Driver/Src/*_template.c>

lib_deps = https://github.com/eagletrt/libeagletrt-sw.git#v0.1.0

check_tool = clangtidy
check_flags =
    clangtidy: --checks=-*,cert-*,clang-analyzer-*,bugprone-*,performance-*,readability-*
    clangtidy: --warnings-as-errors=clang-analyzer-*,bugprone-*
    clangtidy: --header-filter=^.*Core/(Inc|Src)/.*
    clangtidy: --system-headers=false

check_src_filters =
    -<**>
    +<Core/Src/>
    +<Core/Inc/>
    -<Core/Src/stm32*_hal_msp.c>
    -<Core/Src/stm32*_it.c>
    -<Core/Src/syscalls.c>
    -<Core/Src/sysmem.c>

[env:native]
platform = native
test_framework = unity
test_build_src = true

build_flags = 
    -DEAGLETRT_STATIC=
    -DEAGLETRT_STATIC_INLINE=
    -ICore/Inc/ecu/fsm
    -ICore/Inc/ecu/buzzer
    -ICore/Inc/ecu/pedals
    -ICore/Inc/ecu/tractive-system
    -ICore/Inc/ecu/post
    -ICore/Test/include

build_src_filter =
    +<Core/Src/ecu/fsm/>
    +<Core/Src/ecu/buzzer/>
    +<Core/Src/ecu/pedals/>
    +<Core/Src/ecu/post/>
    +<Core/Src/ecu/tractive-system/>

lib_deps = https://github.com/eagletrt/libeagletrt-sw.git#v0.1.0