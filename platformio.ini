[platformio]
src_dir = Core/Src
include_dir = Core/Inc
test_dir = Core/Test

default_envs= nucleo_f767zi ;pio run will exclude native env

[env:native]
platform = native
test_framework = unity
lib_deps = throwtheswitch/Unity@^2.6.0
test_build_src = true
build_src_filter = 
    +<ecu_fsm.c>

[env:nucleo_f767zi]
platform = ststm32  
framework = stm32cube
upload_protocol = stlink
monitor_speed = 115200

board = nucleo_f767zi
board_build.ldscript = 

build_flags = 
    -DUSE_HAL_DRIVERS
    -Wall 
    -Wextra 
    -Wpedantic 
    #-Werror
build_src_filter = 

check_src_filters =
    +<Core/Src/*>
    +<Core/Inc/*>
    +<Core/Test/*>
    -<Drivers/*>
