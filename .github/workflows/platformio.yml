name: PlatformIO Project CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: ${{ !(github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev') }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build
        run: pio run

      - name: Run Unit Tests
        run: pio test -e native # leave native so that we can test without the stm32 libraries

      - name: Static Code Analysis
        if: github.ref == 'refs/heads/dev'
        run: pio check --src-filters="+<Core/Src/*>" --src-filters="+<Core/Inc/*>" --src-filters="+<Core/Test/*>" --src-filters="-<Drivers/*>" || true